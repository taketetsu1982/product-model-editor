<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View Editor</title>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" as="style"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block"/>
<link rel="stylesheet" href="./lib/editor-base.css"/>
</head>
<body>
<div class="file-drop-overlay" id="vw-drop-overlay"><span class="drop-msg">Drop product-model.json to connect</span></div>
<div class="ed-toast" id="vw-toast"></div>
<div class="ed-toolbar" id="vw-toolbar">
  <div style="flex:1"></div>
  <span class="ed-edited" id="vw-edited">Edited</span>
  <button class="ed-connect-btn" id="vw-connect-btn" onclick="handleConnect()">
    <span class="ed-dot" id="vw-dot"></span>
    <span id="vw-label">Connect</span>
    <span class="ed-hint" id="vw-hint">(Drop a JSON file)</span>
  </button>
  <label class="ed-auto-switch" id="vw-auto-btn" onclick="toggleAuto()" title="Auto save">Auto <span class="ed-switch-track"><span class="ed-switch-thumb"></span></span></label>
</div>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="./lib/shared.js"></script>
<script src="./lib/view-logic.js"></script>
<script src="./lib/file-io.js"></script>
<script src="./lib/ui-components.js"></script>

<script>
let passthrough={};
let CONCEPT={objects:[],actors:[]};
let dataRef=null;

function splitData(data){
  const{views,transitions,...rest}=data;
  passthrough=rest;
  CONCEPT={objects:rest.objects||[],actors:rest.actors||[]};
  // crud → crudByActor マイグレーション
  const vws=(views||[]).map(s=>{const aids=s.actorIds||(s.actorId?[s.actorId]:[]);return{...s,objects:(s.objects||[]).map(o=>{if(o.crud&&!o.crudByActor){const ba={};aids.forEach(aid=>{ba[aid]=o.crud.map(op=>({op,scope:"all"}));});return{...o,crudByActor:ba};}return o;})};});
  return{views:vws,transitions:transitions||[]};
}

const io=window.__editorIO.createFileIO({
  ids:{toast:'vw-toast',dot:'vw-dot',label:'vw-label',hint:'vw-hint',edited:'vw-edited',autoBtn:'vw-auto-btn',overlay:'vw-drop-overlay'},
  getFullJson(){if(!dataRef)return null;return{...passthrough,views:dataRef.views,transitions:dataRef.transitions};},
  onDisconnect(){passthrough={};CONCEPT={objects:[],actors:[]};},
  loadDataKey:'__vwLoadData',
  keys:{undo:'__vwUndo',redo:'__vwRedo',copy:'__vwCopy',paste:'__vwPaste',cut:'__vwCut',del:'__vwDelete'},
  filePickerId:'vw-editor',
});
const{showToast,markModified}=io;
function handleConnect(){return io.handleConnect();}
function toggleAuto(){return io.toggleAuto();}
io.setupDragDrop();
io.setupKeyboard();
</script>

<script type="text/babel">
const{useState,useRef,useCallback,useEffect}=React;
const{M3,Input,Sel,Btn,SLabel,useInitialPan,useHistory}=window.__editorUI;
const{CRUD_OPS,CRUD_COLOR,CRUD_BG,OBJ_PALETTE,ZOOM_MIN,ZOOM_MAX,MAX_HISTORY,uid,uniqueName,edgePt,calcCenterPan,labelWidth}=window.__editorLib;
const _ensureViewPositions=window.__editorLib.ensureViewPositions;
const objPalette=id=>window.__editorLib.objPalette(CONCEPT.objects,id);
const objColor=id=>window.__editorLib.objColor(CONCEPT.objects,id);
const objName=id=>window.__editorLib.objName(CONCEPT.objects,id);
const VARIANTS=["collection","single"];
const AREAS=["top","left","right","main","bottom"];

// ビューカードサイズ
const SW=240,SH=76;

const SC_HEADER_H=36,SC_OBJ_START_Y=40,SC_OBJ_ROW_H=22,SC_OBJ_PAD_X=8;

const SC_MIN_SPAN_FACTOR=160,SC_MIN_SPAN_MIN=200;
const EMPTY={views:[],transitions:[]};
const loadGenRef={current:0};

const vwActorIds=s=>(s.actorIds||(s.actorId?[s.actorId]:[]));

function WarningBadge({model}){
  const[open,setOpen]=useState(false);
  const warnings=[];
  CONCEPT.actors.forEach(actor=>{
    const touchedIds=(actor.touches||[]).filter(t=>(t.crud||[]).length>0).map(t=>t.objectId);
    const actorViews=model.views.filter(s=>vwActorIds(s).includes(actor.id));
    const usedIds=new Set(actorViews.flatMap(s=>(s.objects||[]).map(o=>o.objectId)));
    const missing=touchedIds.filter(eid=>!usedIds.has(eid));
    if(missing.length>0){const names=missing.map(eid=>CONCEPT.objects.find(e=>e.id===eid)?.name||eid);warnings.push({actor:actor.name,msg:`「${names.join("」「")}」がビューに含まれていません`});}
    actorViews.forEach(s=>{
      const empty=(s.objects||[]).filter(o=>{const ba=o.crudByActor||{};return(ba[actor.id]||[]).length===0;});
      if(empty.length>0){const names=empty.map(o=>CONCEPT.objects.find(e=>e.id===o.objectId)?.name||o.objectId);warnings.push({actor:actor.name,msg:`『${s.name}』の「${names.join("」「")}」のCRUDが未設定`});}
    });
  });
  if(warnings.length===0)return null;
  return<div style={{position:"absolute",bottom:16,left:16,zIndex:20}}>
    {!open?<button onClick={()=>setOpen(true)} style={{background:"#FEF7E0",border:"1px solid #FDD663",borderRadius:"var(--md-sys-shape-full)",padding:"6px 14px",boxShadow:"var(--md-sys-elevation-1)",cursor:"pointer",display:"flex",alignItems:"center",gap:6,fontSize:13,fontWeight:500,color:"#E37400",fontFamily:"inherit"}}><span>⚠</span>{warnings.length} warnings</button>
    :<div style={{background:"white",border:"1px solid #FDD663",borderRadius:"var(--md-sys-shape-sm)",boxShadow:"var(--md-sys-elevation-2)",maxWidth:480,maxHeight:280,overflowY:"auto"}}>
      <div style={{padding:"8px 12px",borderBottom:"1px solid #FDD663",display:"flex",alignItems:"center",justifyContent:"space-between",background:"#FEF7E0",position:"sticky",top:0}}><span style={{fontSize:13,fontWeight:500,color:"#E37400"}}>⚠ {warnings.length} warnings</span><button onClick={()=>setOpen(false)} style={{background:"none",border:"none",cursor:"pointer",color:"#9AA0A6",padding:0}}><span className="msi" style={{fontSize:18}}>close</span></button></div>
      {warnings.map((w,i)=><div key={i} style={{padding:"6px 12px",borderBottom:"1px solid #F5F5F5",fontSize:12,color:"#5F6368",lineHeight:"16px"}}><strong style={{color:"#1A1A1A"}}>{w.actor}</strong>: {w.msg}</div>)}
    </div>}
  </div>;
}

function MapView({model,setModel,setModelSilent,onSelectScreen,onSelChange,initialActorId}){
  const[filterActorId,setFilterActorId]=useState(initialActorId??null);
  const[selNavId,setSelNavId]=useState(null),[selId,setSelId]=useState(null),[drag,setDrag]=useState(null),[conn,setConn]=useState(null),[connDrag,setConnDrag]=useState(null),[navDrag,setNavDrag]=useState(null),[editLabel,setEditLabel]=useState(false);

  const onHandleMD=(e,navId,end)=>{e.preventDefault();e.stopPropagation();const r=svgRef.current.getBoundingClientRect();setNavDrag({navId,end,mx:(e.clientX-r.left)/zoom+pan.x,my:(e.clientY-r.top)/zoom+pan.y});setSelNavId(null);setEditLabel(false);};

    <div style={{display:"flex",flexDirection:"column",height:"100%",position:"relative"}}>

      </div>

          <div style={{marginBottom:16}}><SLabel>Object Prompt</SLabel><textarea value={selObj.prompt||""} onChange={e=>updObj({...selObj,prompt:e.target.value})} placeholder="このObjectの実装についての補足" style={{width:"100%",boxSizing:"border-box",border:`1px solid ${M3.outlineVar}`,borderRadius:M3.shapeSm,background:"white",fontFamily:"inherit",fontSize:14,color:selObj.prompt?"#1A1A1A":"#C4C7C5",lineHeight:1.6,padding:"8px 16px",resize:"vertical",minHeight:80,outline:"none"}} onFocus={e=>{e.target.style.borderColor="#1A73E8";e.target.style.boxShadow="0 0 0 3px rgba(26,115,232,.12)";e.target.style.color="#1A1A1A";}} onBlur={e=>{e.target.style.borderColor="";e.target.style.boxShadow="none";if(!e.target.value)e.target.style.color="#C4C7C5";}}/></div>
          </>:<>{/* Actor タブ: CRUD + Scope */}
          {CRUD_OPS.map(op=>{const actorCrud=getActorCrud(selObj,viewActorId);const entry=actorCrud.find(c=>c.op===op);const on=!!entry;const scope=entry?.scope||"all";const isOther=scope!=="all"&&scope!=="own";return<div key={op} style={{marginBottom:8,padding:"8px 10px",background:on?CRUD_BG[op]+"80":M3.surfaceCont,borderRadius:8,transition:"background .15s"}}><div style={{display:"flex",alignItems:"center",gap:6}}><button onClick={()=>toggleActorCrud(selObj,viewActorId,op)} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",cursor:"pointer",padding:0,fontFamily:"inherit",flexShrink:0}}><div style={{width:20,height:20,borderRadius:5,border:on?"none":"2px solid #DADCE0",background:on?CRUD_COLOR[op]:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{on&&<span style={{color:"white",fontSize:10,fontWeight:700}}>✓</span>}</div><span style={{fontSize:13,fontWeight:600,color:on?CRUD_COLOR[op]:"#DADCE0"}}>{({C:"Create",R:"Read",U:"Update",D:"Delete"})[op]}</span></button>{on&&<div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center"}}>{["all","own"].map(sc=><button key={sc} onClick={()=>setActorScope(selObj,viewActorId,op,sc)} style={{padding:"8px 16px",fontSize:13,fontWeight:500,borderRadius:M3.shapeFull,cursor:"pointer",border:scope===sc?"none":"1px solid "+M3.outlineVar,background:scope===sc?"#D3E3FD":"white",color:scope===sc?"#041E49":"#9AA0A6"}}>{sc}</button>)}<input value={isOther?scope:""} placeholder="other" onChange={e=>setActorScope(selObj,viewActorId,op,e.target.value||"all")} style={{padding:"8px 16px",fontSize:13,fontWeight:isOther?500:400,borderRadius:M3.shapeFull,cursor:"text",border:isOther?"none":"1px solid "+M3.outlineVar,background:isOther?"#D3E3FD":"white",color:isOther?"#041E49":"#9AA0A6",outline:"none",fontFamily:"inherit",width:56}} onBlur={e=>{if(!e.target.value&&isOther)setActorScope(selObj,viewActorId,op,"all");}}/></div>}</div></div>;})}
          </>}
        </div><div style={{borderTop:`1px solid ${M3.outlineVar}`,padding:16,display:"flex",justifyContent:"flex-end"}}><Btn danger onClick={e=>{e.stopPropagation();delObj(selObj.id);}}>Delete object</Btn></div></div>)}
      </div>
      {emptyCrudObjs.length>0&&<div style={{position:"absolute",bottom:16,left:16,zIndex:20,background:"#FEF7E0",border:"1px solid #FDD663",borderRadius:"var(--md-sys-shape-sm)",padding:"8px 16px",boxShadow:"var(--md-sys-elevation-1)",display:"flex",alignItems:"center",gap:8,maxWidth:560}}>
        <span style={{color:"#E37400",fontSize:16,flexShrink:0}}>⚠</span>
        <span style={{fontSize:13,color:"#5F6368",lineHeight:"18px"}}><strong style={{color:"#1A1A1A"}}>{vwActorIds(vw).map(id=>CONCEPT.actors.find(a=>a.id===id)?.name).filter(Boolean).join(", ")}</strong>: 『{vw.name}』の「{emptyCrudObjs.map(o=>objName(o.objectId)).join("」「")}」のCRUDが設定されていません</span>
      </div>}
    </div>
  );
}

function CollWF({obj,crud,color}){const ops=crud||[];return(<div>{ops.includes("C")&&(<div style={{marginBottom:8,display:"flex",justifyContent:"flex-end"}}><div style={{display:"inline-flex",alignItems:"center",gap:4,padding:"8px 16px",background:CRUD_BG.C,borderRadius:M3.shapeFull,fontSize:13,color:CRUD_COLOR.C,fontWeight:500}}><span className="msi" style={{fontSize:16}}>add</span> New</div></div>)}<table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{["Name","Status","Date"].map(h=>(<th key={h} style={{padding:"8px 8px",fontSize:11,color:"#5F6368",textAlign:"left",fontWeight:500,background:"#FAFAFA",borderBottom:`1px solid ${M3.outlineVar}`}}>{h}</th>))}{(ops.includes("U")||ops.includes("D"))&&<th style={{background:"#FAFAFA",borderBottom:`1px solid ${M3.outlineVar}`,width:72}}/>}</tr></thead><tbody>{PH_ROWS.map((ws,ri)=>(<tr key={ri} style={{borderBottom:"1px solid #FAFAFA"}}>{ws.map((w,ci)=>(<td key={ci} style={{padding:"8px 8px"}}><div style={{height:10,background:"#E0E0E0",borderRadius:5,width:`${w}%`}}/></td>))}{(ops.includes("U")||ops.includes("D"))&&(<td style={{padding:"8px 8px"}}><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>{ops.includes("U")&&<span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:28,height:28,borderRadius:"50%",background:CRUD_BG.U}}><span className="msi" style={{fontSize:16,color:CRUD_COLOR.U}}>edit</span></span>}{ops.includes("D")&&<span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:28,height:28,borderRadius:"50%",background:CRUD_BG.D}}><span className="msi" style={{fontSize:16,color:CRUD_COLOR.D}}>delete</span></span>}</div></td>)}</tr>))}</tbody></table></div>);}

function SingleWF({obj,crud,color}){const ops=crud||[];const actions=[];if(ops.includes("C"))actions.push({icon:"add",label:"New",bg:CRUD_BG.C,fg:CRUD_COLOR.C});if(ops.includes("U"))actions.push({icon:"edit",label:"Edit",bg:CRUD_BG.U,fg:CRUD_COLOR.U});if(ops.includes("D"))actions.push({icon:"delete",label:"Delete",bg:CRUD_BG.D,fg:CRUD_COLOR.D});return(<div>{actions.length>0&&(<div style={{display:"flex",justifyContent:"flex-end",gap:8,marginBottom:16}}>{actions.map(a=>(<div key={a.label} style={{display:"inline-flex",alignItems:"center",gap:4,padding:"8px 16px",background:a.bg,borderRadius:M3.shapeFull,fontSize:13,color:a.fg,fontWeight:500}}><span className="msi" style={{fontSize:16}}>{a.icon}</span> {a.label}</div>))}</div>)}{["Name","Status","Date"].map((f,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:16,marginBottom:16,height:20}}><div style={{width:64,fontSize:12,lineHeight:"20px",color:"#9AA0A6",textAlign:"right",flexShrink:0}}>{f}</div><div style={{flex:1,display:"flex",alignItems:"center"}}><div style={{height:12,background:"#E8EAED",borderRadius:4,width:`${[72,88,56][i%3]}%`}}/></div></div>))}</div>);}

const TABS=[{id:"map",label:"Map"},{id:"detail",label:"View"}];

function App(){
  const{data:model,setData:setModel,setDataSilent:setModelSilent,undo,redo,reset:resetHistory,histRef,dirtyRef}=useHistory(EMPTY,showToast);
  const[view,setView]=useState("map"),[vwId,setVwId]=useState(null),[detailActorId,setDetailActorId]=useState(null);
  // マップビューからの選択状態参照用
  const selRef=useRef({vwId:null,navId:null});
  const clipRef=useRef(null);
  const setSelRef=(vwId,navId)=>{selRef.current={vwId,navId};};

  const handleDelete=useCallback(()=>{
    if(view!=="map")return false;
    const{vwId,navId}=selRef.current;
    if(navId){
      const nav=model.transitions.find(n=>n.id===navId);
      if(!nav)return false;
      setModel(m=>({...m,transitions:m.transitions.filter(n=>n.id!==navId)}));
      showToast('Deleted transition');
      return true;
    }
    if(!vwId)return false;
    const vw=model.views.find(s=>s.id===vwId);
    if(!vw)return false;
    setModel(m=>({...m,views:m.views.filter(s=>s.id!==vwId),transitions:m.transitions.filter(t=>t.from!==vwId&&t.to!==vwId)}));
    showToast('Deleted: '+vw.name);
    return true;
  },[view,model,setModel]);

  const handleCopy=useCallback(()=>{
    const{vwId}=selRef.current;
    if(view!=="map"||!vwId)return false;
    const vw=model.views.find(s=>s.id===vwId);
    if(!vw)return false;
    clipRef.current={type:'view',data:JSON.parse(JSON.stringify(vw))};
    showToast('Copied: '+vw.name);
    return true;
  },[view,model]);

  const handlePaste=useCallback(()=>{
    if(!clipRef.current||clipRef.current.type!=='view')return false;
    const src=clipRef.current.data;
    const names=model.views.map(s=>s.name);
    const newId=uid();
    const pasteActorIds=src.actorIds||(src.actorId?[src.actorId]:[]);
    const newVw={...JSON.parse(JSON.stringify(src)),id:newId,name:uniqueName(src.name,names),actorIds:pasteActorIds,actorId:undefined,x:(src.x||80)+40,y:(src.y||80)+40,objects:src.objects.map(o=>({...o,id:uid()}))};
    setModel(m=>({...m,views:[...m.views,newVw]}));
    showToast('Pasted: '+newVw.name);
    return true;
  },[model,setModel]);

  const handleCut=useCallback(()=>{
    const{vwId}=selRef.current;
    if(view!=="map"||!vwId)return false;
    const vw=model.views.find(s=>s.id===vwId);
    if(!vw)return false;
    clipRef.current={type:'view',data:JSON.parse(JSON.stringify(vw))};
    setModel(m=>({...m,views:m.views.filter(s=>s.id!==vwId),transitions:m.transitions.filter(t=>t.from!==vwId&&t.to!==vwId)}));
    showToast('Cut: '+vw.name);
    return true;
  },[view,model,setModel]);

  useEffect(()=>{
    window.__vwUndo=undo;window.__vwRedo=redo;window.__vwDelete=handleDelete;window.__vwCopy=handleCopy;window.__vwPaste=handlePaste;window.__vwCut=handleCut;
    return()=>{window.__vwUndo=window.__vwRedo=window.__vwDelete=window.__vwCopy=window.__vwPaste=window.__vwCut=null;};
  },[undo,redo,handleDelete,handleCopy,handlePaste,handleCut]);

  useEffect(()=>{dataRef=model;if(dirtyRef.current){dirtyRef.current=false;markModified();}},[model]);
  useEffect(()=>{
    window.__vwLoadData=d=>{
      const scData=_ensureViewPositions(splitData(d),CONCEPT.actors,{cols:SC_GRID_COLS,gapX:SC_GRID_GAP_X,gapY:SC_GRID_GAP_Y,padX:SC_GRID_PAD_X,padY:SC_GRID_PAD_Y,minSpanFactor:SC_MIN_SPAN_FACTOR,minSpanMin:SC_MIN_SPAN_MIN});
      loadGenRef.current++;
      resetHistory(scData);
      setView("map");setVwId(null);
    };
    return()=>{window.__vwLoadData=null;};
  },[]);

  const barRef=useRef(null);
  useEffect(()=>{
    if(!barRef.current)return;
    ['vw-edited','vw-connect-btn','vw-auto-btn'].forEach(id=>{const el=document.getElementById(id);if(el)barRef.current.appendChild(el);});
  },[]);

  const counts={views:model.views.length,transitions:model.transitions.length};
  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:M3.surface,fontFamily:"'Google Sans','Roboto','Noto Sans JP',system-ui,sans-serif",fontSize:14}}>
      <div style={{height:56,background:"#FFFFFF",display:"flex",alignItems:"stretch",flexShrink:0,paddingLeft:16,boxShadow:"var(--md-sys-elevation-1)",position:"relative",zIndex:1}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:14,height:14,borderRadius:"var(--md-sys-shape-xs)",background:"#1A73E8"}}/><span style={{fontSize:22,fontWeight:400,color:M3.onSurface}}>View Editor</span></div>
        <div ref={barRef} style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:16,paddingRight:16,fontSize:14,fontFamily:"inherit"}}/>
      </div>
      <div style={{flex:1,overflow:"hidden"}}>
        {view==="map"&&<MapView model={model} setModel={setModel} setModelSilent={setModelSilent} initialActorId={detailActorId} onSelectScreen={(id,actorId)=>{setVwId(id);setDetailActorId(actorId);setView("detail");}} onSelChange={setSelRef}/>}
        {view==="detail"&&vwId&&<ViewDetailView screenId={vwId} model={model} setModel={setModel} initialActorId={detailActorId} onBack={(actorId)=>{setDetailActorId(actorId);setView("map");setVwId(null);}}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
