<div class="file-drop-overlay" id="ed-drop-overlay"><span class="drop-msg">Drop JSON file to connect</span></div>

  <span class="ed-edited" id="ed-edited">Edited</span>

    <span class="ed-dot" id="ed-dot"></span>
    <span id="ed-label">Connect</span>
    <span class="ed-hint" id="ed-hint">(Drop a JSON file)</span>

<script>
let passthrough={};
let dataRef=null;

const DEFAULT_DEVICES=["mobile","desktop"];
const migrateModelData=window.__editorLib.migrateModelData;
const rectsIntersect=window.__editorLib.rectsIntersect;

function splitData(data){
  // バリアントモードの場合
  if(Array.isArray(data._variants)){
    const err=window.__editorIO.validateVariants(data);
    if(err){io.showToast('バリアントデータが不正です: '+err);return null;}
    const{_variants,...rest}=data;
    passthrough=rest;
    // 各バリアント内のデータにマイグレーションを適用
    const migrated=_variants.map(v=>{
      const sub=migrateModelData(v,io.showToast);
      return{...v,...sub};
    });
    return{_variants:migrated};
  }
  // 通常モード
  const{objects,views,paneGraph,transitions:_tr,screens:_sc,actors:_a,...rest}=data;
  passthrough=rest;
  return migrateModelData({objects,views,paneGraph:paneGraph||data.transitions||[],screens:data.screens||[],devices:data.devices||DEFAULT_DEVICES},io.showToast);
}

const io=window.__editorIO.createFileIO({
  ids:{toast:'ed-toast',dot:'ed-dot',label:'ed-label',hint:'ed-hint',edited:'ed-edited',autoBtn:'ed-auto-btn',overlay:'ed-drop-overlay'},
  getFullJson(){
    if(!dataRef)return null;
    if(dataRef._variants){
      return{...passthrough,_variants:dataRef._variants};
    }
    return{...passthrough,objects:dataRef.objects,views:dataRef.views,paneGraph:dataRef.paneGraph,screens:dataRef.screens,devices:dataRef.devices};
  },
  onDisconnect(){passthrough={};},
  loadDataKey:'__edLoadData',
  keys:{undo:'__edUndo',redo:'__edRedo',copy:'__edCopy',paste:'__edPaste',cut:'__edCut',del:'__edDelete',selectAll:'__edSelectAll',duplicate:'__edDuplicateItem',moveSelection:'__edMoveSelection'},
  filePickerId:'pm-editor',
});
const{showToast,markModified}=io;
function handleConnect(){return io.handleConnect();}
function toggleAuto(){return io.toggleAuto();}
io.setupDragDrop();
io.setupKeyboard();
</script>

},[model.screens,model.views,model.objects,deviceTab])});

  const togglePane=pid=>{if(!selScreen)return;const cur=selScreen.paneIds||[];const next=cur.includes(pid)?cur.filter(x=>x!==pid):[...cur,pid];updScreen({paneIds:next});};
  const handleDeviceSave=(newDevices)=>{setModel(m=>{const removed=new Set((m.devices||[]).filter(d=>!newDevices.includes(d)));return{...m,devices:newDevices,screens:m.screens.filter(s=>!removed.has(s.device))};});if(!newDevices.includes(deviceTab))setDeviceTab(newDevices[0]||"");setShowDeviceEdit(false);};

  // キャンバス操作
  const onBoxMD=(e,id)=>{if(spaceHeld){canvas.onBgMouseDown(e);return;}e.stopPropagation();setSelId(id);const r=svgRef.current.getBoundingClientRect();const mx=(e.clientX-r.left)/zoom+pan.x,my=(e.clientY-r.top)/zoom+pan.y;const sc=(model.screens||[]).find(s=>s.id===id);if(sc){dOff.current={x:mx-(sc.x||0),y:my-(sc.y||0)};setDrag(id);}};
  const onMM=useCallback(e=>{if(spaceHeld&&canvas.onMouseMove(e))return;if(drag){const r=svgRef.current.getBoundingClientRect();const mx=(e.clientX-r.left)/zoom+pan.x,my=(e.clientY-r.top)/zoom+pan.y;setModelSilent(m=>({...m,screens:m.screens.map(s=>s.id===drag?{...s,x:mx-dOff.current.x,y:my-dOff.current.y}:s)}));return;}canvas.onMouseMove(e);},[spaceHeld,drag,zoom,pan,setModelSilent,canvas.onMouseMove]);

        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",paddingRight:16,gap:8}}><Btn small ghost onClick={()=>setShowDeviceEdit(true)}>Edit</Btn></div>

                    <g key={vw.id} transform={`translate(${SCR_PAD},${py})`}>

            })()}

            <div style={{marginBottom:24}}><SLabel>Name</SLabel><Input value={sc.name} onChange={e=>updScreen({name:e.target.value})}/></div>
            <div style={{marginBottom:24}}><SLabel>Panes</SLabel>
              {model.views.length===0?<div style={{fontSize:13,color:"#C4C7C5"}}>Paneがありません</div>:
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                {model.views.map(vw=>{const checked=(sc.paneIds||[]).includes(vw.id);const label=viewLabel(vw,model.objects);const p=objPalette(model.objects,vw.objectId);return(
                  <label key={vw.id} onClick={e=>e.stopPropagation()} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:checked?`${p.bg}18`:"#F8F9FA",borderRadius:8,cursor:"pointer",border:checked?`1px solid ${p.fg}40`:"1px solid transparent",transition:"all .15s"}}>
                    <input type="checkbox" checked={checked} onChange={()=>togglePane(vw.id)} style={{accentColor:"#1A73E8"}}/>
                    <span style={{fontSize:13,color:checked?p.fg:"#5F6368",fontWeight:checked?500:400}}>{label}</span>
                  </label>
                );})}
              </div>}
            </div>
          </div>
          <div style={{borderTop:`1px solid ${M3.outlineVar}`,padding:16,display:"flex",justifyContent:"flex-end"}}><Btn danger onClick={delScreen}>Delete screen</Btn></div>
        </div>
      );})()}
      </div>
      {showDeviceEdit&&<DeviceEditModal devices={devices} onSave={handleDeviceSave} onClose={()=>setShowDeviceEdit(false)}/>}
    </div>
  );
}

/* ===== useClipboard フック ===== */
// クリップボード操作（コピー/ペースト/カット/削除/全選択/複製/矢印移動）を集約
function useClipboard({tab, activeModel, effectiveSetModel, objSelId, setObjSelId, selRelId, setSelRelId, mapSelRef, scrSelRef}){
  const clipRef=useRef(null);

  // コピー: objectタブではオブジェクト、viewタブではビューをコピー
  const handleCopy=useCallback(()=>{
    if(tab==='object'){
      if(!objSelId)return false;
      const ent=(activeModel.objects||[]).find(e=>e.id===objSelId);
      if(!ent)return false;
      clipRef.current={type:'object',data:JSON.parse(JSON.stringify(ent))};
      showToast('Copied: '+ent.name);
      return true;
    }
    if(tab==='pane'){
      const{vwId}=mapSelRef.current;
      if(!vwId)return false;
      const vw=activeModel.views.find(s=>s.id===vwId);
      if(!vw)return false;
      clipRef.current={type:'view',data:JSON.parse(JSON.stringify(vw))};
      showToast('Copied: '+viewLabel(vw,activeModel.objects));
      return true;
    }
    if(tab==='screen'){
      const scId=scrSelRef.current;
      if(!scId)return false;
      const sc=(activeModel.screens||[]).find(s=>s.id===scId);
      if(!sc)return false;
      clipRef.current={type:'screen',data:JSON.parse(JSON.stringify(sc))};
      showToast('Copied: '+sc.name);
      return true;
    }
    return false;
  },[tab,objSelId,activeModel]);

  // ペースト
  const handlePaste=useCallback(()=>{
    if(!clipRef.current)return false;
    if(tab==='object'&&clipRef.current.type==='object'){
      const src=clipRef.current.data;
      const newId=uid();
      effectiveSetModel(m=>{const names=m.objects.map(e=>e.name);const newEnt={...JSON.parse(JSON.stringify(src)),id:newId,name:uniqueName(src.name,names),x:(src.x||80)+40,y:(src.y||80)+40,relations:src.relations.map(r=>({...r,id:uid()}))};return{...m,objects:[...m.objects,newEnt]};});
      setObjSelId(newId);
      showToast('Pasted: '+src.name);
      return true;
    }
    if(tab==='pane'&&clipRef.current.type==='view'){
      const src=clipRef.current.data;
      const newId=uid();
      effectiveSetModel(m=>{const newVw={...JSON.parse(JSON.stringify(src)),id:newId,x:(src.x||80)+40,y:(src.y||80)+40,objectId:src.objectId||"",fields:[...(src.fields||[])],verbs:[...(src.verbs||[])]};delete newVw.objects;delete newVw.name;return{...m,views:[...m.views,newVw]};});
      showToast('Pasted: '+src.name);
      return true;
    }
    if(tab==='screen'&&clipRef.current.type==='screen'){
      const src=clipRef.current.data;
      const newId=uid();
      effectiveSetModel(m=>({...m,screens:[...(m.screens||[]),{...JSON.parse(JSON.stringify(src)),id:newId,x:(src.x||80)+40,y:(src.y||80)+40}]}));
      showToast('Pasted: '+src.name);
      return true;
    }
    return false;
  },[tab,effectiveSetModel]);

  // カット
  const handleCut=useCallback(()=>{
    if(tab==='object'){
      if(!objSelId)return false;
      const ent=(activeModel.objects||[]).find(e=>e.id===objSelId);
      if(!ent)return false;
      clipRef.current={type:'object',data:JSON.parse(JSON.stringify(ent))};
      effectiveSetModel(m=>({...m,objects:m.objects.filter(e=>e.id!==objSelId)}));
      setObjSelId(null);
      showToast('Cut: '+ent.name);
      return true;
    }
    if(tab==='pane'){
      const{vwId}=mapSelRef.current;
      if(!vwId)return false;
      const vw=activeModel.views.find(s=>s.id===vwId);
      if(!vw)return false;
      clipRef.current={type:'view',data:JSON.parse(JSON.stringify(vw))};
      effectiveSetModel(m=>({...m,views:m.views.filter(s=>s.id!==vwId),paneGraph:m.paneGraph.filter(t=>t.from!==vwId&&t.to!==vwId),screens:(m.screens||[]).map(sc=>({...sc,paneIds:(sc.paneIds||[]).filter(p=>p!==vwId)}))}));
      showToast('Cut: '+viewLabel(vw,activeModel.objects));
      return true;
    }
    if(tab==='screen'){
      const scId=scrSelRef.current;
      if(!scId)return false;
      const sc=(activeModel.screens||[]).find(s=>s.id===scId);
      if(!sc)return false;
      clipRef.current={type:'screen',data:JSON.parse(JSON.stringify(sc))};
      effectiveSetModel(m=>({...m,screens:m.screens.filter(s=>s.id!==scId)}));
      showToast('Cut: '+sc.name);
      return true;
    }
    return false;
  },[tab,objSelId,activeModel,effectiveSetModel]);

  // 削除: タブに応じてオブジェクト/リレーション/ビュー/トランジションを削除
  const handleDelete=useCallback(()=>{
    if(tab==='object'){
      if(selRelId){
        const owner=activeModel.objects.find(e=>e.id===selRelId.entId);
        const rel=owner&&owner.relations.find(r=>r.id===selRelId.relId);
        if(!rel)return false;
        effectiveSetModel(m=>({...m,objects:m.objects.map(e=>e.id===selRelId.entId?{...e,relations:e.relations.filter(r=>r.id!==selRelId.relId)}:e)}));
        setSelRelId(null);
        showToast('Deleted relation');
        return true;
      }
      if(!objSelId)return false;
      const ent=activeModel.objects.find(e=>e.id===objSelId);
      if(!ent)return false;
      effectiveSetModel(m=>({...m,objects:m.objects.filter(e=>e.id!==objSelId)}));
      setObjSelId(null);
      showToast('Deleted: '+ent.name);
      return true;
    }
    if(tab==='pane'){
      const{vwId,navId}=mapSelRef.current;
      if(navId){
        const nav=activeModel.paneGraph.find(n=>n.id===navId);
        if(!nav)return false;
        effectiveSetModel(m=>({...m,paneGraph:m.paneGraph.filter(n=>n.id!==navId)}));
        showToast('Deleted edge');
        return true;
      }
      if(!vwId)return false;
      const vw=activeModel.views.find(s=>s.id===vwId);
      if(!vw)return false;
      effectiveSetModel(m=>({...m,views:m.views.filter(s=>s.id!==vwId),paneGraph:m.paneGraph.filter(t=>t.from!==vwId&&t.to!==vwId),screens:(m.screens||[]).map(sc=>({...sc,paneIds:(sc.paneIds||[]).filter(p=>p!==vwId)}))}));
      showToast('Deleted: '+viewLabel(vw,activeModel.objects));
      return true;
    }
    if(tab==='screen'){
      const scId=scrSelRef.current;
      if(!scId)return false;
      const sc=(activeModel.screens||[]).find(s=>s.id===scId);
      if(!sc)return false;
      effectiveSetModel(m=>({...m,screens:m.screens.filter(s=>s.id!==scId)}));
      showToast('Deleted: '+sc.name);
      return true;
    }
    return false;
  },[tab,objSelId,selRelId,activeModel,effectiveSetModel]);

  // 全選択
  const handleSelectAll=useCallback(()=>{
    if(tab==='object'){
      const ids=new Set((activeModel.objects||[]).map(e=>e.id));
      if(ids.size===0)return false;
      setObjSelId(null);
      window.__edSetMultiSel?.(ids);
      return true;
    }
    if(tab==='pane'){
      const ids=new Set((activeModel.views||[]).map(v=>v.id));
      if(ids.size===0)return false;
      window.__edSetMultiSel?.(ids);
      return true;
    }
    return false;
  },[tab,activeModel]);

  // 複製（Cmd+D）
  const handleDuplicateItem=useCallback(()=>{
    if(tab==='object'){
      if(!objSelId)return false;
      const ent=(activeModel.objects||[]).find(e=>e.id===objSelId);
      if(!ent)return false;
      const newId=uid();
      effectiveSetModel(m=>{const names=m.objects.map(e=>e.name);const cloned=JSON.parse(JSON.stringify(ent));cloned.id=newId;cloned.name=uniqueName(ent.name,names);cloned.x=(ent.x||0)+20;cloned.y=(ent.y||0)+20;cloned.relations=cloned.relations.map(r=>({...r,id:uid()}));return{...m,objects:[...m.objects,cloned]};});
      setObjSelId(newId);
      showToast('Duplicated: '+ent.name);
      return true;
    }
    if(tab==='pane'){
      const{vwId}=mapSelRef.current;
      if(!vwId)return false;
      const vw=(activeModel.views||[]).find(s=>s.id===vwId);
      if(!vw)return false;
      const newId=uid();
      effectiveSetModel(m=>({...m,views:[...m.views,{...JSON.parse(JSON.stringify(vw)),id:newId,x:(vw.x||0)+20,y:(vw.y||0)+20}]}));
      showToast('Duplicated');
      return true;
    }
    if(tab==='screen'){
      const scId=scrSelRef.current;
      if(!scId)return false;
      const sc=(activeModel.screens||[]).find(s=>s.id===scId);
      if(!sc)return false;
      const newId=uid();
      effectiveSetModel(m=>({...m,screens:[...(m.screens||[]),{...JSON.parse(JSON.stringify(sc)),id:newId,x:(sc.x||0)+20,y:(sc.y||0)+20}]}));
      showToast('Duplicated: '+sc.name);
      return true;
    }
    return false;
  },[tab,objSelId,activeModel,effectiveSetModel]);

  // 矢印キー移動
  const handleMoveSelection=useCallback(({dx,dy})=>{
    if(tab==='object'){
      const multi=window.__edGetMultiSel?.();
      if(multi&&multi.size>0){
        effectiveSetModel(m=>({...m,objects:m.objects.map(e=>multi.has(e.id)?{...e,x:(e.x||0)+dx,y:(e.y||0)+dy}:e)}));
        return true;
      }
      if(objSelId){
        effectiveSetModel(m=>({...m,objects:m.objects.map(e=>e.id===objSelId?{...e,x:(e.x||0)+dx,y:(e.y||0)+dy}:e)}));
        return true;
      }
      return false;
    }
    if(tab==='pane'){
      const multi=window.__edGetMultiSel?.();
      if(multi&&multi.size>0){
        effectiveSetModel(m=>({...m,views:m.views.map(v=>multi.has(v.id)?{...v,x:(v.x||0)+dx,y:(v.y||0)+dy}:v)}));
        return true;
      }
      const{vwId}=mapSelRef.current;
      if(vwId){
        effectiveSetModel(m=>({...m,views:m.views.map(v=>v.id===vwId?{...v,x:(v.x||0)+dx,y:(v.y||0)+dy}:v)}));
        return true;
      }
      return false;
    }
    if(tab==='screen'){
      const scId=scrSelRef.current;
      if(scId){
        effectiveSetModel(m=>({...m,screens:(m.screens||[]).map(s=>s.id===scId?{...s,x:(s.x||0)+dx,y:(s.y||0)+dy}:s)}));
        return true;
      }
      return false;
    }
    return false;
  },[tab,objSelId,effectiveSetModel]);

  return{handleCopy,handlePaste,handleCut,handleDelete,handleSelectAll,handleDuplicateItem,handleMoveSelection};
}

/* ===== useGlobalKeys フック ===== */
// グローバルwindow関数の登録・解除を管理
function useGlobalKeys({handleUndo,handleRedo,handleCopy,handlePaste,handleCut,handleDelete,handleSelectAll,handleDuplicateItem,handleMoveSelection}){
  useEffect(()=>{
    window.__edUndo=handleUndo;window.__edRedo=handleRedo;
    window.__edCopy=handleCopy;window.__edPaste=handlePaste;
    window.__edCut=handleCut;window.__edDelete=handleDelete;
    window.__edSelectAll=handleSelectAll;window.__edDuplicateItem=handleDuplicateItem;window.__edMoveSelection=handleMoveSelection;
    return()=>{window.__edUndo=window.__edRedo=window.__edCopy=window.__edPaste=window.__edCut=window.__edDelete=window.__edSelectAll=window.__edDuplicateItem=window.__edMoveSelection=null;};
  },[handleUndo,handleRedo,handleCopy,handlePaste,handleCut,handleDelete,handleSelectAll,handleDuplicateItem,handleMoveSelection]);
}

/* ===== 統合App ===== */
const TABS=[{id:"object",label:"Object"},{id:"pane",label:"Pane"},{id:"screen",label:"Screen"}];

function App(){
  const{data:model,setData:setModel,setDataSilent:setModelSilent,undo,redo,reset:resetHistory,histRef,dirtyRef}=useHistory(EMPTY,showToast);
  const[tab,setTab]=useState("object");
  // タブごとのzoom/pan状態を保持
  const tabViewState=useRef({object:{zoom:null,pan:null},pane:{zoom:null,pan:null},screen:{zoom:null,pan:null}});
  const[objSelId,setObjSelId]=useState(null);
  const[selRelId,setSelRelId]=useState(null);
  // マップビューからの選択状態参照用
  const mapSelRef=useRef({vwId:null,navId:null});
  const setMapSelRef=(vwId,navId)=>{mapSelRef.current={vwId,navId};};
  const scrSelRef=useRef(null);
  const setScrSelRef=id=>{scrSelRef.current=id;};

  // --- バリアント管理 ---
  const variantList=isVariantMode(model)?getVariantList(model):[];
  const activeVariant=isVariantMode(model)?getActiveVariant(model):null;
  const activeModel=activeVariant||model;

  const handleDuplicate=useCallback(()=>{
    setModel(m=>toVariantMode(m));
    showToast('Duplicated');
  },[setModel]);

  const handleKeep=useCallback(()=>{
    if(!activeVariant)return;
    if(!window.confirm('「'+activeVariant.name+'」を採用し、他のバリアントを削除します。よろしいですか？'))return;
    setModel(m=>keepVariant(m,activeVariant.id));
    setSplitMode(null);
    showToast('Kept: '+activeVariant.name);
  },[setModel,activeVariant]);

  const handleDeleteVariant=useCallback((variantId)=>{
    const v=variantList.find(v=>v.id===variantId);
    if(!window.confirm('「'+(v?.name||variantId)+'」を削除しますか？'))return;
    setModel(m=>deleteVariant(m,variantId));
    if(splitMode&&(splitMode.left===variantId||splitMode.right===variantId))setSplitMode(null);
    showToast('Deleted variant');
  },[setModel,variantList,splitMode]);

  const handleSwitchVariant=useCallback((variantId)=>{
    setModel(m=>switchVariant(m,variantId));
  },[setModel]);

  const handleRenameVariant=useCallback((variantId,newName)=>{
    setModel(m=>renameVariant(m,variantId,newName));
  },[setModel]);

  // バリアントモード時のsetModel: アクティブバリアントのデータだけ更新（variantIdを履歴に記録）
  const setActiveModel=useCallback((updater)=>{
    setModel(m=>{
      if(!isVariantMode(m))return typeof updater==='function'?updater(m):updater;
      const active=getActiveVariant(m);
      const updated=typeof updater==='function'?updater(active):updater;
      return updateVariantData(m,active.id,updated);
    }, activeVariant?.id);
  },[setModel,activeVariant]);

  const inVariantMode=isVariantMode(model);
  const effectiveSetModel=useMemo(()=>inVariantMode?setActiveModel:setModel,[inVariantMode,setActiveModel,setModel]);

  const setActiveModelSilent=useCallback((updater)=>{
    setModelSilent(m=>{
      if(!isVariantMode(m))return typeof updater==='function'?updater(m):updater;
      const active=getActiveVariant(m);
      const updated=typeof updater==='function'?updater(active):updater;
      return updateVariantData(m,active.id,updated);
    });
  },[setModelSilent]);
  const effectiveSetModelSilent=useMemo(()=>inVariantMode?setActiveModelSilent:setModelSilent,[inVariantMode,setActiveModelSilent,setModelSilent]);

  // Split View状態
  const[splitMode,setSplitMode]=useState(null); // null | { left: variantId, right: variantId }
  const[splitPicking,setSplitPicking]=useState(null); // null | { selected: [] }

  // Split View用: バリアントIDからモデルデータを取得
  const getVariantModel=useCallback((variantId)=>{
    if(!isVariantMode(model))return model;
    const v=model._variants.find(v=>v.id===variantId);
    return v||activeModel;
  },[model,activeModel]);

  // Split View用: バリアントIDを指定してモデルを更新（variantIdを履歴に記録）
  const setVariantModel=useCallback((variantId)=>(updater)=>{
    setModel(m=>{
      if(!isVariantMode(m))return typeof updater==='function'?updater(m):updater;
      const v=m._variants.find(v=>v.id===variantId);
      if(!v)return m;
      const updated=typeof updater==='function'?updater(v):updater;
      return updateVariantData(m,variantId,updated);
    }, variantId);
  },[setModel]);

  // Split View用: Silent版（ドラッグ操作時にhistoryエントリを作らない）
  const setVariantModelSilent=useCallback((variantId)=>(updater)=>{
    setModelSilent(m=>{
      if(!isVariantMode(m))return typeof updater==='function'?updater(m):updater;
      const v=m._variants.find(v=>v.id===variantId);
      if(!v)return m;
      const updated=typeof updater==='function'?updater(v):updater;
      return updateVariantData(m,variantId,updated);
    });
  },[setModelSilent]);

  // Undo/Redoでバリアント自動切替（Splitモード時は閉じる）
  const handleUndo=useCallback(()=>{
    const targetVid=undo();
    if(targetVid && splitMode){
      if(splitMode.left!==targetVid && splitMode.right!==targetVid){
        setSplitMode(null);
      }
    }
  },[undo,splitMode]);

  const handleRedo=useCallback(()=>{
    const targetVid=redo();
    if(targetVid && splitMode){
      if(splitMode.left!==targetVid && splitMode.right!==targetVid){
        setSplitMode(null);
      }
    }
  },[redo,splitMode]);

  // クリップボード操作フック
  const{handleCopy,handlePaste,handleCut,handleDelete,handleSelectAll,handleDuplicateItem,handleMoveSelection}=useClipboard({tab,activeModel,effectiveSetModel,objSelId,setObjSelId,selRelId,setSelRelId,mapSelRef,scrSelRef});

  // グローバル関数登録フック
  useGlobalKeys({handleUndo,handleRedo,handleCopy,handlePaste,handleCut,handleDelete,handleSelectAll,handleDuplicateItem,handleMoveSelection});

  // データ変更検知
  useEffect(()=>{dataRef=model;if(dirtyRef.current){dirtyRef.current=false;markModified();}},[model]);

  // データロード
  useEffect(()=>{
    window.__edLoadData=d=>{
      const loaded=splitData(d);
      if(!loaded)return;
      if(loaded._variants){
        // バリアントモード: 各バリアントに個別に位置計算を適用
        const processed={...loaded,_variants:loaded._variants.map(v=>{
          const p=ensurePositions(v);
          return ensureViewPositions(p);
        })};
        loadGenRef.current++;
        resetHistory(processed);
      } else {
        const positioned=ensurePositions(loaded);
        const viewPositioned=ensureViewPositions(positioned);
        loadGenRef.current++;
        resetHistory(viewPositioned);
      }
      setTab("object");
      setObjSelId(null);
      setSelRelId(null);
    };
    return()=>{window.__edLoadData=null;};
  },[]);

  // ヘッダーのファイル接続ボタン移植
  const barRef=useRef(null);
  useEffect(()=>{
    if(!barRef.current)return;
    ['ed-edited','ed-connect-btn','ed-auto-btn'].forEach(id=>{
      const el=document.getElementById(id);
      if(el)barRef.current.appendChild(el);
    });
  },[]);

  const counts={object:(activeModel.objects||[]).length,pane:(activeModel.views||[]).length,screen:(activeModel.screens||[]).length};

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:M3.surface,fontFamily:"'Google Sans','Roboto','Noto Sans JP',system-ui,sans-serif",fontSize:14}}>
      <div style={{height:56,background:"#FFFFFF",display:"flex",alignItems:"stretch",flexShrink:0,paddingLeft:16,boxShadow:"var(--md-sys-elevation-1)",position:"relative",zIndex:1}}>
        <div style={{display:"flex",alignItems:"center",marginRight:24,gap:8}}>
          <div style={{width:14,height:14,borderRadius:"var(--md-sys-shape-xs)",background:"#1A73E8"}}/>
          <span style={{fontSize:22,fontWeight:400,color:M3.onSurface}}>Product Model Editor</span>
        </div>
        {TABS.map(t=>{const isAct=tab===t.id,cnt=counts[t.id];return(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"0 16px",border:"none",background:"transparent",cursor:"pointer",color:isAct?"#1A73E8":"#9AA0A6",fontSize:14,fontWeight:500,lineHeight:"20px",letterSpacing:"0.1px",borderBottom:`3px solid ${isAct?"#1A73E8":"transparent"}`,borderTop:"3px solid transparent",fontFamily:"inherit",transition:"color .15s"}}>
            {t.label}{cnt>0&&<span style={{marginLeft:6,display:"inline-flex",alignItems:"center",justifyContent:"center",minWidth:20,height:20,padding:"0 6px",borderRadius:"var(--md-sys-shape-full)",background:isAct?"#D3E3FD":"#E8EAED",color:isAct?"#041E49":"#5F6368",fontSize:11,fontWeight:600,lineHeight:1}}>{cnt}</span>}
          </button>);})}
        <div ref={barRef} style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:12,paddingRight:16,fontSize:14,fontFamily:"inherit"}}/>
      </div>
      {variantList.length>0&&<VariantBar
        variants={variantList}
        isSplit={!!splitMode}
        onSwitch={handleSwitchVariant}
        onDuplicate={handleDuplicate}
        onDelete={handleDeleteVariant}
        onRename={handleRenameVariant}
        onSplit={()=>{
          if(splitMode){setSplitMode(null);}
          else if(variantList.length===2){setSplitMode({left:variantList[0].id,right:variantList[1].id});}
          else{setSplitPicking({selected:[]});}
        }}
        onKeep={handleKeep}
      />}
      <div style={{flex:1,overflow:"hidden",display:splitMode?"flex":"block"}}>
        {splitMode?<>
          {/* 左パネル */}
          <div style={{flex:1,overflow:"hidden",borderRight:"2px solid "+M3.outlineVar,position:"relative"}}>
            <div style={{position:"absolute",top:8,right:8,zIndex:10,display:"flex",alignItems:"center",gap:4,background:M3.primaryContainer,color:M3.onPrimaryContainer,padding:"2px 8px",borderRadius:M3.shapeSm,fontSize:11,fontWeight:500}}>
              <select value={splitMode.left} onChange={e=>setSplitMode(s=>({...s,left:e.target.value}))} style={{border:"none",background:"transparent",color:"inherit",fontSize:11,fontWeight:500,fontFamily:"inherit",cursor:"pointer"}}>
                {variantList.filter(v=>v.id!==splitMode.right).map(v=><option key={v.id} value={v.id}>{v.name}</option>)}
              </select>
            </div>
            {tab==="object"&&<ObjectView model={getVariantModel(splitMode.left)} setModel={setVariantModel(splitMode.left)} setModelSilent={setVariantModelSilent(splitMode.left)} selId={objSelId} setSelId={setObjSelId} selRelId={selRelId} setSelRelId={setSelRelId} savedViewState={tabViewState.current.object} onViewStateChange={s=>{tabViewState.current.object=s;}}/>}
            {tab==="pane"&&<MapView model={getVariantModel(splitMode.left)} setModel={setVariantModel(splitMode.left)} setModelSilent={setVariantModelSilent(splitMode.left)} onSelChange={setMapSelRef} savedViewState={tabViewState.current.pane} onViewStateChange={s=>{tabViewState.current.pane=s;}}/>}
            {tab==="screen"&&<ScreenView model={getVariantModel(splitMode.left)} setModel={setVariantModel(splitMode.left)} setModelSilent={setVariantModelSilent(splitMode.left)} onSelChange={setScrSelRef} savedViewState={tabViewState.current.screen} onViewStateChange={s=>{tabViewState.current.screen=s;}}/>}
          </div>
          {/* 右パネル */}
          <div style={{flex:1,overflow:"hidden",position:"relative"}}>
            <div style={{position:"absolute",top:8,right:8,zIndex:10,display:"flex",alignItems:"center",gap:4,background:M3.surfaceCont,color:M3.onSurface,padding:"2px 8px",borderRadius:M3.shapeSm,fontSize:11,fontWeight:500}}>
              <select value={splitMode.right} onChange={e=>setSplitMode(s=>({...s,right:e.target.value}))} style={{border:"none",background:"transparent",color:"inherit",fontSize:11,fontWeight:500,fontFamily:"inherit",cursor:"pointer"}}>
                {variantList.filter(v=>v.id!==splitMode.left).map(v=><option key={v.id} value={v.id}>{v.name}</option>)}
              </select>
            </div>
            {tab==="object"&&<ObjectView model={getVariantModel(splitMode.right)} setModel={setVariantModel(splitMode.right)} setModelSilent={setVariantModelSilent(splitMode.right)} selId={objSelId} setSelId={setObjSelId} selRelId={selRelId} setSelRelId={setSelRelId} savedViewState={tabViewState.current.object} onViewStateChange={s=>{tabViewState.current.object=s;}}/>}
            {tab==="pane"&&<MapView model={getVariantModel(splitMode.right)} setModel={setVariantModel(splitMode.right)} setModelSilent={setVariantModelSilent(splitMode.right)} onSelChange={setMapSelRef} savedViewState={tabViewState.current.pane} onViewStateChange={s=>{tabViewState.current.pane=s;}}/>}
            {tab==="screen"&&<ScreenView model={getVariantModel(splitMode.right)} setModel={setVariantModel(splitMode.right)} setModelSilent={setVariantModelSilent(splitMode.right)} onSelChange={setScrSelRef} savedViewState={tabViewState.current.screen} onViewStateChange={s=>{tabViewState.current.screen=s;}}/>}
          </div>
        </>:<>
          {tab==="object"&&<ObjectView model={activeModel} setModel={effectiveSetModel} setModelSilent={effectiveSetModelSilent} selId={objSelId} setSelId={setObjSelId} selRelId={selRelId} setSelRelId={setSelRelId} savedViewState={tabViewState.current.object} onViewStateChange={s=>{tabViewState.current.object=s;}} onSplit={handleDuplicate}/>}
          {tab==="pane"&&<MapView model={activeModel} setModel={effectiveSetModel} setModelSilent={effectiveSetModelSilent} onSelChange={setMapSelRef} savedViewState={tabViewState.current.pane} onViewStateChange={s=>{tabViewState.current.pane=s;}} onSplit={handleDuplicate}/>}
          {tab==="screen"&&<ScreenView model={activeModel} setModel={effectiveSetModel} setModelSilent={effectiveSetModelSilent} onSelChange={setScrSelRef} onSplit={handleDuplicate} savedViewState={tabViewState.current.screen} onViewStateChange={s=>{tabViewState.current.screen=s;}}/>}
        </>}
      </div>
      {splitPicking&&<div style={{position:"fixed",inset:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.3)"}} onClick={()=>setSplitPicking(null)}>
        <div style={{background:"#fff",borderRadius:12,padding:24,minWidth:240,boxShadow:"var(--md-sys-elevation-3)"}} onClick={e=>e.stopPropagation()}>
          <div style={{fontSize:14,fontWeight:500,marginBottom:16,color:M3.onSurface}}>比較する2つを選択</div>
          {variantList.map(v=>{
            const sel=(splitPicking.selected||[]).includes(v.id);
            return<button key={v.id} onClick={()=>{
              const next=sel?splitPicking.selected.filter(id=>id!==v.id):[...splitPicking.selected,v.id];
              if(next.length===2){setSplitMode({left:next[0],right:next[1]});setSplitPicking(null);}
              else setSplitPicking({selected:next});
            }} style={{display:"block",width:"100%",padding:"8px 12px",marginBottom:4,border:sel?"2px solid #1A73E8":"1px solid "+M3.outlineVar,borderRadius:8,background:sel?"#E8F0FE":"transparent",cursor:"pointer",fontSize:13,fontFamily:"inherit",textAlign:"left",color:M3.onSurface}}>{v.name}</button>;
          })}
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
