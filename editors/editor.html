<script>
let passthrough={};
let dataRef=null;

function splitData(data){
  const{objects,views,paneGraph,transitions:_tr,screens:_sc,actors:_a,...rest}=data;
  passthrough=rest;
  // objects マイグレーション: belongs-to → has-many
  const objs=objects||[];
  let migrated=false;
  objs.forEach(e=>{(e.relations||[]).forEach(r=>{if(r.type==='belongs-to'){r.type='has-many';migrated=true;}});});
  if(migrated)setTimeout(()=>io.showToast('belongs-toをhas-manyに自動変換しました'),300);
  // ビューマイグレーション: objects配列 → objectId + fields + verbs
  let vwMigrated=false;
  const vws=(views||[]).map(v=>{
    if(v.objects&&!v.objectId){
      vwMigrated=true;
      const first=v.objects[0];
      const{objects:_,...rest2}=v;
      return{...rest2,objectId:first?.objectId||"",type:first?.variant||v.type||"collection",fields:v.fields||[],verbs:v.verbs||[]};
    }
    return{...v,fields:v.fields||[],verbs:v.verbs||[]};
  });
  if(vwMigrated)setTimeout(()=>io.showToast('ビュースキーマを新形式に自動変換しました'),600);
  const DEFAULT_DEVICES=["mobile","desktop"];
  return{objects:objs,views:vws,paneGraph:paneGraph||data.transitions||[],screens:data.screens||[],devices:data.devices||DEFAULT_DEVICES};
}

const io=window.__editorIO.createFileIO({
  ids:{toast:'ed-toast',dot:'ed-dot',label:'ed-label',hint:'ed-hint',edited:'ed-edited',autoBtn:'ed-auto-btn',overlay:'ed-drop-overlay'},
  getFullJson(){if(!dataRef)return null;return{...passthrough,objects:dataRef.objects,views:dataRef.views,paneGraph:dataRef.paneGraph,screens:dataRef.screens,devices:dataRef.devices};},
  onDisconnect(){passthrough={};},
  loadDataKey:'__edLoadData',
  keys:{undo:'__edUndo',redo:'__edRedo',copy:'__edCopy',paste:'__edPaste',cut:'__edCut',del:'__edDelete'},
  filePickerId:'pm-editor',
});
const{showToast,markModified}=io;
function handleConnect(){return io.handleConnect();}
function toggleAuto(){return io.toggleAuto();}
io.setupDragDrop();
io.setupKeyboard();
</script>

const DEVICE_ICONS={mobile:"smartphone",tablet:"tablet",desktop:"desktop_windows"};
// Screenカード定数
const SCR_PAD=12,SCR_HEADER_H=40,SCR_PANE_H=36,SCR_PANE_GAP=4,SCR_PANE_PAD=8,SCR_MIN_W=200;
// Screenカードの幅・高さ計算
const scrCardSize=(sc,views,objects)=>{const panes=(sc.paneIds||[]).map(pid=>views.find(v=>v.id===pid)).filter(Boolean);const pw=panes.reduce((mx,vw)=>{const lbl=viewLabel(vw,objects);return Math.max(mx,labelWidth(lbl)+40);},0);const w=Math.max(SCR_MIN_W,pw+SCR_PANE_PAD*2+SCR_PAD*2);const bodyH=panes.length>0?(panes.length*SCR_PANE_H+(panes.length-1)*SCR_PANE_GAP+SCR_PANE_PAD*2):48;return{w,h:SCR_HEADER_H+bodyH};};

function ScreenView({model,setModel,setModelSilent,onSelChange}){
  const devices=model.devices||["mobile","desktop"];
  const[deviceTab,setDeviceTab]=useState(()=>devices[0]||"mobile");
  const selByDevice=useRef({});
  const[,forceUpdate]=useState(0);
  const selId=selByDevice.current[deviceTab]||null;
  const setSelId=id=>{selByDevice.current={...selByDevice.current,[deviceTab]:id};forceUpdate(n=>n+1);};
  const[showDeviceEdit,setShowDeviceEdit]=useState(false);
  const[drag,setDrag]=useState(null);
  const{svgRef,pan,setPan}=useInitialPan((model.screens||[]).filter(s=>(s.device||devices[0])===deviceTab),SCR_MIN_W,100,loadGenRef);
  const[panning,setPanning]=useState(false);
  const[zoom,setZoom]=useState(1);
  const dOff=useRef({x:0,y:0}),panStart=useRef({x:0,y:0,px:0,py:0});
  const selScreen=selId?(model.screens||[]).find(s=>s.id===selId):null;

  const addScreen=()=>{const id=uid();setModel(m=>({...m,screens:[...(m.screens||[]),{id,name:"New Screen",device:deviceTab,paneIds:[],x:120/zoom+pan.x,y:120/zoom+pan.y}]}));setSelId(id);};
  const updScreen=patch=>setModel(m=>({...m,screens:m.screens.map(s=>s.id===selId?{...s,...patch}:s)}));
  const delScreen=()=>{setSelId(null);setModel(m=>({...m,screens:m.screens.filter(s=>s.id!==selId)}));};
  const togglePane=pid=>{if(!selScreen)return;const cur=selScreen.paneIds||[];const next=cur.includes(pid)?cur.filter(x=>x!==pid):[...cur,pid];updScreen({paneIds:next});};
  const handleDeviceSave=(newDevices)=>{setModel(m=>{const removed=new Set((m.devices||[]).filter(d=>!newDevices.includes(d)));return{...m,devices:newDevices,screens:m.screens.filter(s=>!removed.has(s.device))};});if(!newDevices.includes(deviceTab))setDeviceTab(newDevices[0]||"");setShowDeviceEdit(false);};

  // デバイスごとにグルーピング
  const byDevice={};
  devices.forEach(d=>{byDevice[d]=[];});
  (model.screens||[]).forEach(sc=>{const d=sc.device||devices[0];if(byDevice[d])byDevice[d].push(sc);});
  const items=byDevice[deviceTab]||[];

  useEffect(()=>{onSelChange?.(selId);},[selId]);

  // キャンバス操作
  const onBgMD=e=>{setPanning(true);panStart.current={x:e.clientX,y:e.clientY,px:pan.x,py:pan.y};};
  const onBoxMD=(e,id)=>{e.stopPropagation();setSelId(id);const r=svgRef.current.getBoundingClientRect();const mx=(e.clientX-r.left)/zoom+pan.x,my=(e.clientY-r.top)/zoom+pan.y;const sc=(model.screens||[]).find(s=>s.id===id);if(sc){dOff.current={x:mx-(sc.x||0),y:my-(sc.y||0)};setDrag(id);}};
  const onMM=useCallback(e=>{if(drag){const r=svgRef.current.getBoundingClientRect();const mx=(e.clientX-r.left)/zoom+pan.x,my=(e.clientY-r.top)/zoom+pan.y;setModelSilent(m=>({...m,screens:m.screens.map(s=>s.id===drag?{...s,x:mx-dOff.current.x,y:my-dOff.current.y}:s)}));return;}if(panning){setPan({x:panStart.current.px-(e.clientX-panStart.current.x)/zoom,y:panStart.current.py-(e.clientY-panStart.current.y)/zoom});}},[drag,panning,pan,zoom,setModelSilent]);
  const onUp=()=>{if(drag)setModel(m=>m);setDrag(null);setPanning(false);};
  const onWheel=useCallback(e=>{e.preventDefault();if(e.ctrlKey||e.metaKey){const r=svgRef.current.getBoundingClientRect();const mx=(e.clientX-r.left),my=(e.clientY-r.top);const d=e.deltaY>0?0.92:1.08;setZoom(z=>{const nz=Math.min(ZOOM_MAX,Math.max(ZOOM_MIN,z*d));const wx=mx/z+pan.x,wy=my/z+pan.y;setPan({x:wx-mx/nz,y:wy-my/nz});return nz;});}else{setPan(p=>({x:p.x+e.deltaX/zoom,y:p.y+e.deltaY/zoom}));}},[zoom,pan]);

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>

        {devices.map(d=>{const isAct=deviceTab===d;const cnt=(byDevice[d]||[]).length;return<button key={d} onClick={()=>setDeviceTab(d)} style={{padding:"0 20px",border:"none",background:"transparent",cursor:"pointer",color:isAct?"#1A73E8":"#9AA0A6",fontSize:14,fontWeight:isAct?500:400,borderBottom:`3px solid ${isAct?"#1A73E8":"transparent"}`,borderTop:"3px solid transparent",fontFamily:"inherit",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:6}}><span className="msi" style={{fontSize:18}}>{DEVICE_ICONS[d]||"devices"}</span>{d}{cnt>0&&<span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",minWidth:20,height:20,padding:"0 6px",borderRadius:"var(--md-sys-shape-full)",background:isAct?"#D3E3FD":"#E8EAED",color:isAct?"#041E49":"#5F6368",fontSize:11,fontWeight:600,lineHeight:1}}>{cnt}</span>}</button>;})}
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",paddingRight:16,gap:8}}><Btn small ghost onClick={()=>setShowDeviceEdit(true)}>Edit</Btn></div>
      </div>
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        <div style={{flex:1,position:"relative",overflow:"hidden"}}>
          <svg ref={svgRef} width="100%" height="100%" style={{cursor:drag?"grabbing":panning?"grabbing":"grab",display:"block",userSelect:drag||panning?"none":"auto"}} onMouseMove={onMM} onMouseUp={onUp} onMouseLeave={onUp} onWheel={onWheel} onClick={e=>{if(e.target===e.currentTarget||e.target.getAttribute('data-bg')){setSelId(null);}}}>
            <defs><pattern id="scrdots" width={24/zoom} height={24/zoom} patternUnits="userSpaceOnUse" x={(-pan.x*zoom)%24} y={(-pan.y*zoom)%24}><circle cx={1/zoom} cy={1/zoom} r={1/zoom} fill="#E0E0E0"/></pattern><marker id="scrarr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#9AA0A6"/></marker></defs>
            <rect width="100%" height="100%" fill="url(#scrdots)" data-bg="1" onMouseDown={onBgMD}/>
            <g transform={`scale(${zoom}) translate(${-pan.x},${-pan.y})`}>
            {items.map(sc=>{const isSel=selId===sc.id;const sx=sc.x||0,sy=sc.y||0;const panes=(sc.paneIds||[]).map(pid=>model.views.find(v=>v.id===pid)).filter(Boolean);const{w:cardW,h:cardH}=scrCardSize(sc,model.views,model.objects);return(
              <g key={sc.id} transform={`translate(${sx},${sy})`} onMouseDown={e=>onBoxMD(e,sc.id)} style={{cursor:drag?"grabbing":"grab"}}>
                <rect x={1} y={2} width={cardW} height={cardH} rx={14} fill="rgba(0,0,0,0.04)"/>
                <rect width={cardW} height={cardH} rx={14} fill="white"/>
                <clipPath id={`scrclip-${sc.id}`}><rect width={cardW} height={cardH} rx={14}/></clipPath>
                <g clipPath={`url(#scrclip-${sc.id})`}>
                  <rect width={cardW} height={SCR_HEADER_H} fill={isSel?"#E8F0FE":"#F8F9FA"}/>
                  <foreignObject x={0} y={0} width={cardW} height={SCR_HEADER_H}>
                    <div style={{display:"flex",alignItems:"center",gap:6,padding:"0 14px",height:SCR_HEADER_H,boxSizing:"border-box"}}>
                      <span className="msi" style={{fontSize:16,color:"#5F6368"}}>{DEVICE_ICONS[sc.device||"mobile"]}</span>
                      <span style={{fontSize:14,fontWeight:500,color:M3.onSurface,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sc.name}</span>
                    </div>
                  </foreignObject>
                  {panes.map((vw,pi)=>{const p=objPalette(model.objects,vw.objectId);const py=SCR_HEADER_H+SCR_PANE_PAD+pi*(SCR_PANE_H+SCR_PANE_GAP);const pw=cardW-SCR_PAD*2;const typeIcon=vw.type==="single"?"article":"view_list";return(
                    <g key={vw.id} transform={`translate(${SCR_PAD},${py})`}>
                      <rect width={pw} height={SCR_PANE_H} rx={10} fill={p.bg}/>
                      <foreignObject x={0} y={0} width={pw} height={SCR_PANE_H}>
                        <div style={{display:"flex",alignItems:"center",gap:4,padding:"0 10px",height:SCR_PANE_H,boxSizing:"border-box"}}>
                          <span className="msi" style={{fontSize:16,color:p.fg}}>{typeIcon}</span>
                          <span style={{fontSize:13,fontWeight:500,color:p.fg,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{viewLabel(vw,model.objects)}</span>
                        </div>
                      </foreignObject>
                    </g>
                  );})}
                  {panes.length===0&&<text x={cardW/2} y={SCR_HEADER_H+24} fontSize={12} fill="#C4C7C5" textAnchor="middle">Paneなし</text>}
                </g>
                <rect width={cardW} height={cardH} rx={14} fill="none" stroke={isSel?"#1A73E8":"#E0E0E0"} strokeWidth={isSel?2.5:1.5}/>
              </g>
            );})}
            {/* Screen間の辺（paneGraphからScreen接続を導出、同一方向の重複排除） */}
            {(()=>{
              // Pane→所属Screen一覧マップ
              const paneToScrs={};
              items.forEach(sc=>{(sc.paneIds||[]).forEach(pid=>{if(!paneToScrs[pid])paneToScrs[pid]=[];paneToScrs[pid].push(sc.id);});});
              // Object+Type→所属Screen一覧マップ（embed用: 同じObject・同じtypeのPaneを同一視）
              const objTypeToScrs={};
              items.forEach(sc=>{(sc.paneIds||[]).forEach(pid=>{const vw=model.views.find(v=>v.id===pid);if(!vw)return;const k=vw.objectId+":"+vw.type;if(!objTypeToScrs[k])objTypeToScrs[k]=new Set();objTypeToScrs[k].add(sc.id);});});
              // Pane ID→Object+Typeマップ（事前構築）
              const paneObjTypeMap={};
              model.views.forEach(vw=>{paneObjTypeMap[vw.id]=vw.objectId+":"+vw.type;});
              // Screen間接続を導出（同一方向ペアの重複排除）
              const seen=new Set();const lines=[];
              (model.paneGraph||[]).forEach(edge=>{const isEmbed=(edge.type||"drilldown")==="embed";if(isEmbed){const fk=paneObjTypeMap[edge.from],tk=paneObjTypeMap[edge.to];if(!fk||!tk)return;const fScrs=[...(objTypeToScrs[fk]||[])],tScrs=[...(objTypeToScrs[tk]||[])];fScrs.forEach(fid=>{tScrs.forEach(tid=>{if(fid===tid)return;const uKey=fid<tid?fid+":"+tid:tid+":"+fid;if(seen.has(uKey))return;seen.add(uKey);lines.push({fid,tid,key:uKey,isEmbed:true});});});}else{const fromScrs=paneToScrs[edge.from]||[],toScrs=paneToScrs[edge.to]||[];fromScrs.forEach(fid=>{toScrs.forEach(tid=>{if(fid===tid)return;const dKey=fid+">"+tid;if(seen.has(dKey))return;seen.add(dKey);lines.push({fid,tid,key:dKey,isEmbed:false});});});}});
              return lines.map(({fid,tid,key,isEmbed})=>{const sf=items.find(s=>s.id===fid),st=items.find(s=>s.id===tid);if(!sf||!st)return null;const sfSize=scrCardSize(sf,model.views,model.objects),stSize=scrCardSize(st,model.views,model.objects);const f=edgePt(sf.x||0,sf.y||0,sfSize.w,sfSize.h,(st.x||0)+stSize.w/2,(st.y||0)+stSize.h/2),t=edgePt(st.x||0,st.y||0,stSize.w,stSize.h,(sf.x||0)+sfSize.w/2,(sf.y||0)+sfSize.h/2);return<line key={`se-${key}`} x1={f.x} y1={f.y} x2={t.x} y2={t.y} stroke="#9AA0A6" strokeWidth={1.5} markerEnd={isEmbed?undefined:"url(#scrarr)"}/>;});
            })()}
            </g>
          </svg>
          <div style={{position:"absolute",top:16,left:16,display:"flex",gap:8,alignItems:"center"}}><Btn small onClick={addScreen}><span style={{display:"inline-flex",alignItems:"center",gap:4}}><span className="msi" style={{fontSize:16}}>add_box</span> Screen</span></Btn></div>
          <div style={{position:"absolute",bottom:16,right:16,display:"flex",alignItems:"center",gap:4,background:"white",borderRadius:"var(--md-sys-shape-full)",padding:"4px 8px",boxShadow:"var(--md-sys-elevation-1)"}}>
            <button onClick={()=>{const r=svgRef.current?.getBoundingClientRect();if(!r)return;const cx=r.width/2,cy=r.height/2;setZoom(z=>{const nz=Math.max(ZOOM_MIN,z*0.8);const wx=cx/z+pan.x,wy=cy/z+pan.y;setPan({x:wx-cx/nz,y:wy-cy/nz});return nz;});}} style={{width:28,height:28,border:"none",background:"transparent",cursor:"pointer",fontSize:16,color:"#5F6368",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}} onMouseEnter={e=>{e.target.style.background="#F5F5F5";}} onMouseLeave={e=>{e.target.style.background="transparent";}}>−</button>
            <button onClick={()=>{const r=svgRef.current?.getBoundingClientRect();if(!r)return;const cx=r.width/2,cy=r.height/2;setZoom(z=>{const wx=cx/z+pan.x,wy=cy/z+pan.y;setPan({x:wx-cx,y:wy-cy});return 1;});}} style={{minWidth:48,height:28,border:"none",background:"transparent",cursor:"pointer",fontSize:12,fontWeight:500,color:"#5F6368",borderRadius:14,fontFamily:"inherit"}} onMouseEnter={e=>{e.target.style.background="#F5F5F5";}} onMouseLeave={e=>{e.target.style.background="transparent";}}>{Math.round(zoom*100)}%</button>
            <button onClick={()=>{const r=svgRef.current?.getBoundingClientRect();if(!r)return;const cx=r.width/2,cy=r.height/2;setZoom(z=>{const nz=Math.min(ZOOM_MAX,z*1.25);const wx=cx/z+pan.x,wy=cy/z+pan.y;setPan({x:wx-cx/nz,y:wy-cy/nz});return nz;});}} style={{width:28,height:28,border:"none",background:"transparent",cursor:"pointer",fontSize:16,color:"#5F6368",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}} onMouseEnter={e=>{e.target.style.background="#F5F5F5";}} onMouseLeave={e=>{e.target.style.background="transparent";}}>+</button>
          </div>
        </div>
      {selScreen&&(()=>{const sc=selScreen;return(
        <div style={{width:400,borderLeft:`1px solid ${M3.outlineVar}`,background:M3.surfaceContLow,display:"flex",flexDirection:"column",flexShrink:0}}>
          <div style={{padding:"16px 16px",borderBottom:`1px solid ${M3.outlineVar}`,display:"flex",alignItems:"center",justifyContent:"space-between",background:M3.surface}}>
            <span style={{fontSize:12,fontWeight:500,color:M3.onSurfaceVar,textTransform:"uppercase",letterSpacing:"0.5px"}}>Screen</span>
            <button onClick={()=>setSelId(null)} style={{background:"none",border:"none",cursor:"pointer",color:M3.onSurfaceVar}}><span className="msi" style={{fontSize:20}}>close</span></button>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:16}}>
            <div style={{marginBottom:24}}><SLabel>Name</SLabel><Input value={sc.name} onChange={e=>updScreen({name:e.target.value})}/></div>
            <div style={{marginBottom:24}}><SLabel>Panes</SLabel>
              {model.views.length===0?<div style={{fontSize:13,color:"#C4C7C5"}}>Paneがありません</div>:
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                {model.views.map(vw=>{const checked=(sc.paneIds||[]).includes(vw.id);const label=viewLabel(vw,model.objects);const p=objPalette(model.objects,vw.objectId);return(
                  <label key={vw.id} onClick={e=>e.stopPropagation()} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:checked?`${p.bg}18`:"#F8F9FA",borderRadius:8,cursor:"pointer",border:checked?`1px solid ${p.fg}40`:"1px solid transparent",transition:"all .15s"}}>
                    <input type="checkbox" checked={checked} onChange={()=>togglePane(vw.id)} style={{accentColor:"#1A73E8"}}/>
                    <span style={{fontSize:13,color:checked?p.fg:"#5F6368",fontWeight:checked?500:400}}>{label}</span>
                  </label>
                );})}
              </div>}
            </div>
          </div>
          <div style={{borderTop:`1px solid ${M3.outlineVar}`,padding:16,display:"flex",justifyContent:"flex-end"}}><Btn danger onClick={delScreen}>Delete screen</Btn></div>
        </div>
      );})()}
      </div>
      {showDeviceEdit&&<DeviceEditModal devices={devices} onSave={handleDeviceSave} onClose={()=>setShowDeviceEdit(false)}/>}
    </div>
  );
}

/* ===== 統合App ===== */
const TABS=[{id:"object",label:"Object"},{id:"pane",label:"Pane"},{id:"screen",label:"Screen"}];

function App(){
  const{data:model,setData:setModel,setDataSilent:setModelSilent,undo,redo,reset:resetHistory,histRef,dirtyRef}=useHistory(EMPTY,showToast);
  const[tab,setTab]=useState("object");
  // タブごとのzoom/pan状態を保持
  const tabViewState=useRef({object:{zoom:null,pan:null},pane:{zoom:null,pan:null}});
  const[objSelId,setObjSelId]=useState(null);
  const[selRelId,setSelRelId]=useState(null);
  const clipRef=useRef(null);
  // マップビューからの選択状態参照用
  const mapSelRef=useRef({vwId:null,navId:null});
  const setMapSelRef=(vwId,navId)=>{mapSelRef.current={vwId,navId};};
  const scrSelRef=useRef(null);
  const setScrSelRef=id=>{scrSelRef.current=id;};

  // コピー: objectタブではオブジェクト、viewタブではビューをコピー
  const handleCopy=useCallback(()=>{
    if(tab==='object'){
      if(!objSelId)return false;
      const ent=histRef.current.stack[histRef.current.idx]?.objects?.find(e=>e.id===objSelId);
      if(!ent)return false;
      clipRef.current={type:'object',data:JSON.parse(JSON.stringify(ent))};
      showToast('Copied: '+ent.name);
      return true;
    }
    if(tab==='pane'){
      const{vwId}=mapSelRef.current;
      if(!vwId)return false;
      const vw=model.views.find(s=>s.id===vwId);
      if(!vw)return false;
      clipRef.current={type:'view',data:JSON.parse(JSON.stringify(vw))};
      showToast('Copied: '+viewLabel(vw,model.objects));
      return true;
    }
    if(tab==='screen'){
      const scId=scrSelRef.current;
      if(!scId)return false;
      const sc=(model.screens||[]).find(s=>s.id===scId);
      if(!sc)return false;
      clipRef.current={type:'screen',data:JSON.parse(JSON.stringify(sc))};
      showToast('Copied: '+sc.name);
      return true;
    }
    return false;
  },[tab,objSelId,model]);

  // ペースト
  const handlePaste=useCallback(()=>{
    if(!clipRef.current)return false;
    if(tab==='object'&&clipRef.current.type==='object'){
      const src=clipRef.current.data;
      const newId=uid();
      setModel(m=>{const names=m.objects.map(e=>e.name);const newEnt={...JSON.parse(JSON.stringify(src)),id:newId,name:uniqueName(src.name,names),x:(src.x||80)+40,y:(src.y||80)+40,relations:src.relations.map(r=>({...r,id:uid()}))};return{...m,objects:[...m.objects,newEnt]};});
      setObjSelId(newId);
      showToast('Pasted: '+src.name);
      return true;
    }
    if(tab==='pane'&&clipRef.current.type==='view'){
      const src=clipRef.current.data;
      const newId=uid();
      setModel(m=>{const newVw={...JSON.parse(JSON.stringify(src)),id:newId,x:(src.x||80)+40,y:(src.y||80)+40,objectId:src.objectId||"",fields:[...(src.fields||[])],verbs:[...(src.verbs||[])]};delete newVw.objects;delete newVw.name;return{...m,views:[...m.views,newVw]};});
      showToast('Pasted: '+src.name);
      return true;
    }
    if(tab==='screen'&&clipRef.current.type==='screen'){
      const src=clipRef.current.data;
      const newId=uid();
      setModel(m=>({...m,screens:[...(m.screens||[]),{...JSON.parse(JSON.stringify(src)),id:newId,x:(src.x||80)+40,y:(src.y||80)+40}]}));
      showToast('Pasted: '+src.name);
      return true;
    }
    return false;
  },[tab,setModel]);

  // カット
  const handleCut=useCallback(()=>{
    if(tab==='object'){
      if(!objSelId)return false;
      const ent=histRef.current.stack[histRef.current.idx]?.objects?.find(e=>e.id===objSelId);
      if(!ent)return false;
      clipRef.current={type:'object',data:JSON.parse(JSON.stringify(ent))};
      setModel(m=>({...m,objects:m.objects.filter(e=>e.id!==objSelId)}));
      setObjSelId(null);
      showToast('Cut: '+ent.name);
      return true;
    }
    if(tab==='pane'){
      const{vwId}=mapSelRef.current;
      if(!vwId)return false;
      const vw=model.views.find(s=>s.id===vwId);
      if(!vw)return false;
      clipRef.current={type:'view',data:JSON.parse(JSON.stringify(vw))};
      setModel(m=>({...m,views:m.views.filter(s=>s.id!==vwId),paneGraph:m.paneGraph.filter(t=>t.from!==vwId&&t.to!==vwId),screens:(m.screens||[]).map(sc=>({...sc,paneIds:(sc.paneIds||[]).filter(p=>p!==vwId)}))}));
      showToast('Cut: '+viewLabel(vw,model.objects));
      return true;
    }
    if(tab==='screen'){
      const scId=scrSelRef.current;
      if(!scId)return false;
      const sc=(model.screens||[]).find(s=>s.id===scId);
      if(!sc)return false;
      clipRef.current={type:'screen',data:JSON.parse(JSON.stringify(sc))};
      setModel(m=>({...m,screens:m.screens.filter(s=>s.id!==scId)}));
      showToast('Cut: '+sc.name);
      return true;
    }
    return false;
  },[tab,objSelId,model,setModel]);

  // 削除: タブに応じてオブジェクト/リレーション/ビュー/トランジションを削除
  const handleDelete=useCallback(()=>{
    if(tab==='object'){
      if(selRelId){
        const owner=model.objects.find(e=>e.id===selRelId.entId);
        const rel=owner&&owner.relations.find(r=>r.id===selRelId.relId);
        if(!rel)return false;
        setModel(m=>({...m,objects:m.objects.map(e=>e.id===selRelId.entId?{...e,relations:e.relations.filter(r=>r.id!==selRelId.relId)}:e)}));
        setSelRelId(null);
        showToast('Deleted relation');
        return true;
      }
      if(!objSelId)return false;
      const ent=model.objects.find(e=>e.id===objSelId);
      if(!ent)return false;
      setModel(m=>({...m,objects:m.objects.filter(e=>e.id!==objSelId)}));
      setObjSelId(null);
      showToast('Deleted: '+ent.name);
      return true;
    }
    if(tab==='pane'){
      const{vwId,navId}=mapSelRef.current;
      if(navId){
        const nav=model.paneGraph.find(n=>n.id===navId);
        if(!nav)return false;
        setModel(m=>({...m,paneGraph:m.paneGraph.filter(n=>n.id!==navId)}));
        showToast('Deleted edge');
        return true;
      }
      if(!vwId)return false;
      const vw=model.views.find(s=>s.id===vwId);
      if(!vw)return false;
      setModel(m=>({...m,views:m.views.filter(s=>s.id!==vwId),paneGraph:m.paneGraph.filter(t=>t.from!==vwId&&t.to!==vwId),screens:(m.screens||[]).map(sc=>({...sc,paneIds:(sc.paneIds||[]).filter(p=>p!==vwId)}))}));
      showToast('Deleted: '+viewLabel(vw,model.objects));
      return true;
    }
    if(tab==='screen'){
      const scId=scrSelRef.current;
      if(!scId)return false;
      const sc=(model.screens||[]).find(s=>s.id===scId);
      if(!sc)return false;
      setModel(m=>({...m,screens:m.screens.filter(s=>s.id!==scId)}));
      showToast('Deleted: '+sc.name);
      return true;
    }
    return false;
  },[tab,objSelId,selRelId,model,setModel]);

  // グローバル関数登録
  useEffect(()=>{
    window.__edUndo=undo;window.__edRedo=redo;
    window.__edCopy=handleCopy;window.__edPaste=handlePaste;
    window.__edCut=handleCut;window.__edDelete=handleDelete;
    return()=>{window.__edUndo=window.__edRedo=window.__edCopy=window.__edPaste=window.__edCut=window.__edDelete=null;};
  },[undo,redo,handleCopy,handlePaste,handleCut,handleDelete]);

  // データ変更検知
  useEffect(()=>{dataRef=model;if(dirtyRef.current){dirtyRef.current=false;markModified();}},[model]);

  // データロード
  useEffect(()=>{
    window.__edLoadData=d=>{
      const loaded=splitData(d);
      const positioned=ensurePositions(loaded);
      const viewPositioned=ensureViewPositions(positioned);
      loadGenRef.current++;
      resetHistory(viewPositioned);
      setTab("object");
      setObjSelId(null);
      setSelRelId(null);
    };
    return()=>{window.__edLoadData=null;};
  },[]);

  // ヘッダーのファイル接続ボタン移植
  const barRef=useRef(null);
  useEffect(()=>{
    if(!barRef.current)return;
    ['ed-edited','ed-connect-btn','ed-auto-btn'].forEach(id=>{
      const el=document.getElementById(id);
      if(el)barRef.current.appendChild(el);
    });
  },[]);

  const counts={object:model.objects.length,pane:model.views.length,screen:(model.screens||[]).length};

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:M3.surface,fontFamily:"'Google Sans','Roboto','Noto Sans JP',system-ui,sans-serif",fontSize:14}}>
      <div style={{height:56,background:"#FFFFFF",display:"flex",alignItems:"stretch",flexShrink:0,paddingLeft:16,boxShadow:"var(--md-sys-elevation-1)",position:"relative",zIndex:1}}>
        <div style={{display:"flex",alignItems:"center",marginRight:24,gap:8}}>
          <div style={{width:14,height:14,borderRadius:"var(--md-sys-shape-xs)",background:"#1A73E8"}}/>
          <span style={{fontSize:22,fontWeight:400,color:M3.onSurface}}>Product Model Editor</span>
        </div>
        {TABS.map(t=>{const isAct=tab===t.id,cnt=counts[t.id];return(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"0 16px",border:"none",background:"transparent",cursor:"pointer",color:isAct?"#1A73E8":"#9AA0A6",fontSize:14,fontWeight:500,lineHeight:"20px",letterSpacing:"0.1px",borderBottom:`3px solid ${isAct?"#1A73E8":"transparent"}`,borderTop:"3px solid transparent",fontFamily:"inherit",transition:"color .15s"}}>
            {t.label}{cnt>0&&<span style={{marginLeft:6,display:"inline-flex",alignItems:"center",justifyContent:"center",minWidth:20,height:20,padding:"0 6px",borderRadius:"var(--md-sys-shape-full)",background:isAct?"#D3E3FD":"#E8EAED",color:isAct?"#041E49":"#5F6368",fontSize:11,fontWeight:600,lineHeight:1}}>{cnt}</span>}
          </button>);})}
        <div ref={barRef} style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:12,paddingRight:16,fontSize:14,fontFamily:"inherit"}}/>
      </div>
      <div style={{flex:1,overflow:"hidden"}}>
        {tab==="object"&&<ObjectView model={model} setModel={setModel} setModelSilent={setModelSilent} selId={objSelId} setSelId={setObjSelId} selRelId={selRelId} setSelRelId={setSelRelId} savedViewState={tabViewState.current.object} onViewStateChange={s=>{tabViewState.current.object=s;}}/>}

        {tab==="pane"&&<MapView model={model} setModel={setModel} setModelSilent={setModelSilent} onSelChange={setMapSelRef} savedViewState={tabViewState.current.pane} onViewStateChange={s=>{tabViewState.current.pane=s;}}/>}
        {tab==="screen"&&<ScreenView model={model} setModel={setModel} setModelSilent={setModelSilent} onSelChange={setScrSelRef}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
